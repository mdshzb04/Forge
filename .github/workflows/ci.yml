name: ci
env:
  PYTHONUTF8: "1"
on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Smoke test CLI
        run: |
          forge --version
          forge --help
          forge graph --help

      - name: Lint
        run: python -m ruff check forgecli tests

      - name: Tests
        run: python -m pytest -q

      - name: Cross-platform shell smoke
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python -c "from forgecli.platform import run; r = run(['echo', 'cross-platform']); print('OK' if r.ok else 'FAIL')"

      - name: Cross-platform shell smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -c "from forgecli.platform import run; r = run(['cmd.exe', '/c', 'echo cross-platform']); print('OK' if r.ok else 'FAIL')"

  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: python -m pip install --upgrade build twine
      - name: Build
        run: python -m build
      - name: Verify package metadata
        run: |
          twine check dist/*
          python - <<'PY'
          import zipfile
          from pathlib import Path
          wheel = next(Path("dist").glob("*.whl"))
          with zipfile.ZipFile(wheel) as zf:
              names = zf.namelist()
          assert any(n.startswith("forgecli/") for n in names), "missing forgecli package"
          print(f"OK: {wheel.name}")
          PY
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  uv-install:
    name: uv tool install (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install forgectx via uv tool
        shell: bash
        run: |
          uv tool install dist/*.whl

      - name: Verify forge --help
        run: forge --help

      - name: Verify wrapper commands are registered
        run: |
          forge claude --help
          forge codex --help
          forge cursor --help
          forge opencode --help
          forge commandcode --help


  publish-testpypi:
    name: publish to TestPyPI (on tag or manual)
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [test, build, uv-install]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: publish to PyPI (on tag or manual)
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [test, build, uv-install]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

