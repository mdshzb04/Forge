# ForgeCLI Winget package manifest.
#
# Preferred install method:  uv tool install forgecli
# After installation:        forge init
#
# To validate locally:
#   winget validate --manifest .\packaging\winget\forgecli.ForgeCli.yaml
#
# To submit to winget-pkgs:
#   1. Fork https://github.com/microsoft/winget-pkgs
#   2. Copy this file to manifests/m/forgecli/ForgeCli/<version>/forgecli.ForgeCli.yaml
#   3. Update the version + installerUrl + installerSha256.
PackageIdentifier: forgecli.ForgeCli
PackageVersion: 0.1.0
PackageLocale: en-US
PackageName: ForgeCLI
Publisher: forgecli
ShortDescription: AI-first developer operating system — Ponytail built-in, ForgeGraph optional, any LLM.
Description: |
  ForgeCLI is an AI Development Operating System. Install with
  `uv tool install forgecli`, then run `forge init` — that's it.

  Ponytail prompt optimization is built-in. ForgeGraph repo intelligence is
  an optional enhancement (uv tool install graphifyy).

  Pipeline: ForgeGraph retrieval -> Ponytail optimization -> LLM call ->
  diff -> apply -> test -> summary.
License: MIT
Tags:
- ai
- cli
- developer-tools
- git
- code-intelligence
PackageLocale: en-US
PublisherUrl: https://github.com/forgecli/ForgeCli
PublisherSupportUrl: https://github.com/forgecli/ForgeCli/issues
PrivacyUrl: https://github.com/forgecli/ForgeCli/blob/main/LICENSE
Author: ForgeCLI Authors
Moniker: forgecli
DescriptionUrl: https://github.com/forgecli/ForgeCli
Installers:
- Architecture: x64
  InstallerType: pip
  InstallerUrl: https://files.pythonhosted.org/packages/source/f/forgecli/forgecli-0.1.0.tar.gz
  InstallerSha256: REPLACE_WITH_REAL_SHA256
