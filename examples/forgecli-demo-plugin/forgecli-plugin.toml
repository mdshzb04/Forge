[plugin]
name = "demo"
version = "0.1.0"
summary = "Demo plugin: registers a custom provider + health probe."
description = "A runnable example used by the PLUGINS.md guide."
authors = ["ForgeCLI Authors"]
license = "MIT"
homepage = "https://github.com/forgecli/ForgeCli"

permissions = ["network", "filesystem"]

[plugin.entry_points.provider]
demo = "demo_plugin:register"

[plugin.entry_points.observability]
health = "demo_plugin:health"

[plugin.compatibility]
min_sdk = "0.1.0"
python = ">=3.12"
os = ["linux", "macos", "windows"]

[plugin.config_schema]
greeting = { type = "string", default = "hello" }
max_tokens = { type = "integer", default = 256 }
